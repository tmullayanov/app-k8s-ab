apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-v1
  namespace: ab-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: v1
  template:
    metadata:
      labels:
        app: myapp
        version: v1
    spec:
      containers:
      - name: myapp
        image: myapp:latest
        imagePullPolicy: IfNotPresent # necessary for local images
        ports:
        - containerPort: 8000
        env:
        - name: APP_VERSION
          value: "v1"