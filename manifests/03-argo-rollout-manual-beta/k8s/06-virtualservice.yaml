apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: myapp
  namespace: 03-rollout-header-split-demo
spec:
  hosts:
  - "myapp.rollout.split.local"
  gateways:
  - myapp-rollout-split-gateway
  http:
  - name: primary # must match the name in Argo Rollout's trafficRouting.istio.virtualServices.routes
    route:
    - destination:
        host: myapp-stable.03-rollout-header-split-demo.svc.cluster.local
      weight: 100
    - destination:
        host: myapp-canary.03-rollout-header-split-demo.svc.cluster.local
      weight: 0