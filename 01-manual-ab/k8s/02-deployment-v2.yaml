apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-v2
  namespace: ab-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
      version: v2
  template:
    metadata:
      labels:
        app: myapp
        version: v2
    spec:
      containers:
      - name: myapp
        image: myapp:v2
        imagePullPolicy: IfNotPresent # necessary for local images
        ports:
        - containerPort: 8000